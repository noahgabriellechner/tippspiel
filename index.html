<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Profilseite</title>

   <style>
    body {
      font-family: Arial, sans-serif;
      background-image: url("rasen.png");
      background-size: cover;
      background-position: center;
      background-repeat: repeat;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      max-width: 250px;
      margin: 12px auto;
      background: white;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .profil {
      max-width: 500px;
      margin: 12px auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .profil p {
      padding: 12px 14px;
      background: #f8fafc;
      border-radius: 10px;
      margin: 0 0 12px;
    }

    #ausgabe {
      max-width: 500px;
      margin: 16px auto 0;
      color: #b91c1c;
      font-weight: bold;
    }
  </style>

</head>
<body>

    <h1>Mein Profil</h1>

    <div class="profil">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Benutzername:</strong> <span id="username"></span></p>
        <p><strong>E-Mail:</strong> <span id="email"></span></p>
    </div>

    <div id="ausgabe"></div>

   


     
    
 <!--Logik und DB-Verbindung mit JavaScript -->
  <script type="module">

    
     //---------------------------------------------------------------------
    //Supabase Verbindung (nicht ändern!!)
    //----------------------------------------------------------------------
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://kmhwwdsuzphkpfupkynf.supabase.co";
    const supabaseKey = "sb_publishable_7ih4VSPUkXVfHkBa7lrDCA_mO_d0pW1";

    const supabase = createClient(supabaseUrl, supabaseKey);

 //ende der Verbindung-------------------------------------------------------------

   async function loadProfile(username) 
   {

    const { data: users,error:  errorusers} = await supabase.from("users").select("*");
     if(errorusers)
     {
        document.getElementById("ausgabe").innerText=errorusers.message;
        return;
     }

     let indexUser = -1; 

     for(let i = 0; i < users.length; i++)
     {
        if(username == users[i].username)
        {
            indexUser = i;
        }
     }

    document.getElementById("name").innerText=users[indexUser].Vorname + " " + users[indexUser].Name;
    document.getElementById("username").innerText=users[indexUser].username;
    //document.getElementById("email").innerText=users[indexUser].email;
    }

// WICHTIG: Funktion starten
loadProfile("EmelieErdbeer");
//ende der Funktion----------------------

</script> 
</body>
</html>
