    button:disabled {

    .error-icon {
      color: white;
      background-color: #e60000;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 12px;
      line-height: 18px;
      text-align: center;
      font-family: "Georgia", serif;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
      margin-left: 8px;
      vertical-align: middle;
      position: relative;
    }

    .error-icon::after {
      content: "Der Username kann maximal 10 Zeichen sein!";
      position: absolute;
      bottom: 140%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
    }

    .error-icon::before {
      content: "";
      position: absolute;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px;
      border-style: solid;
      border-color: #333 transparent transparent transparent;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 999;
    }

    .error-icon:hover::after, .error-icon:hover::before,
    .error-icon.active::after, .error-icon.active::before {
      visibility: visible;
      opacity: 1;
    }

    .info-badge {
      display: inline-flex;

    .info-badge::before {

    .info-badge:hover::after, .info-badge:hover::before,

 <!--Logik und DB-Verbindung mit JavaScript -->
  <script type="module">

    //Logik mit JavaScript --> beide Gruppen müssen hier arbeiten
    //siehe betreffender Bereich!!





     //---------------------------------------------------------------------
    //Supabase Verbindung (nicht ändern!!)
    //----------------------------------------------------------------------
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://kmhwwdsuzphkpfupkynf.supabase.co";
    const supabaseKey = "sb_publishable_7ih4VSPUkXVfHkBa7lrDCA_mO_d0pW1";

    const supabase = createClient(supabaseUrl, supabaseKey);
    let countdownInterval = null;
    let spielLadeId = 0;

    let typewriterTimeout = null;
    let typingAktiv = true;
    //----------------------------------------------------------------------
    //Gruppe1: Eingabe
    //----------------------------------------------------------------------

    function starteBegruessungAnim() {
        const name = document.getElementById("name").value.trim() || "Tipper";
        const text = `Hallo ${name}! Bereit zum Tippen?`;
        const element = document.getElementById("begruessung_text");
        element.innerText = "";
        let i = 0;

        typingAktiv = true;

        function type() {
            if (!typingAktiv) return;
            if (i < text.length) {
                element.innerText += text.charAt(i);
                i++;
                typewriterTimeout = setTimeout(type, 65);
            } else {
                typingAktiv = false;
            }
        }
        type();
    }

    async function spielLaden() {

        let meineLadeId = ++spielLadeId;

        // Zeichenlimit info
        let rawName = document.getElementById("name").value;
        if (rawName.length > 10) {
            rawName = rawName.slice(0, 10);
            document.getElementById("name").value = rawName;
        }
        const errorIcon = document.getElementById("limit-error");
        if (rawName.length >= 10) {
        errorIcon.style.display = "inline-block";
        } else {
        errorIcon.style.display = "none";
        }

        const id = document.getElementById("spiel_select").value;
        const name = document.getElementById("name").value.trim();
        //TestNameInternerSpeicher
        localStorage.setItem("tippspiel_username", name);

        const aktuellerName = name || "Tipper";
        if (!typingAktiv) {
            document.getElementById("begruessung_text").innerText = `Hallo ${aktuellerName}! Bereit zum Tippen?`;
        } else if (rawName.length > 0 && typewriterTimeout) {
            typingAktiv = false;
            clearTimeout(typewriterTimeout);
            document.getElementById("begruessung_text").innerText = `Hallo ${aktuellerName}! Bereit zum Tippen?`;
        }

        //Alter Timer löschen
        if (countdownInterval) {
            clearInterval(countdownInterval);
            countdownInterval = null;
        }
        // 1. Eingabefelder und Platzhalter standarmäßig zurücksetzen
        document.getElementById("overlay").style.display = "none";
        document.getElementById("tippSpeichern").disabled = false;
        document.getElementById("tore_a").disabled = false;
        document.getElementById("tore_b").disabled = false;
        document.getElementById("tore_a").value = "";
        document.getElementById("tore_b").value = "";
        document.getElementById("tore_a").placeholder = "0";
        document.getElementById("tore_b").placeholder = "0";

        // Wenn kein Spiel ausgewählt ist, hier stoppen
        if (!id) {
            document.getElementById("spiel_datum").innerText = "--.--.";
            document.getElementById("spiel_zeit").innerText = "--:--";
            document.getElementById("countdown_box").innerText = "--";
            offeneTippsBerechnen();
            return;
        }

        // 2. Aus der Tabelle "spiele" das Spiel mit dieser ID laden
        const { data: spiel, error } = await supabase
            .from("spiele")
            .select('team_a, team_b, Startzeit, "Spiel_fertig?", tore_team_a, tore_team_b')
            .eq("id", id)
            .single();

        if (meineLadeId !== spielLadeId) return;
        if (error) {
            alert("Fehler beim Laden der Spieldaten von ID " + id);
            console.error(error);
            return;
        }



        // 3. Teamnamen in HTML-Elemente 
        document.getElementById("team_a").innerText = spiel.team_a;
        document.getElementById("team_b").innerText = spiel.team_b;


        if (spiel.Startzeit) {

            const datumObjekt = new Date(spiel.Startzeit);

            const formatiertesDatum = datumObjekt.toLocaleDateString('de-DE', {
                day: '2-digit',
                month: '2-digit'
            });


            const formatierteZeit = datumObjekt.toLocaleTimeString('de-DE', {
                hour: '2-digit',
                minute: '2-digit'
            });
        document.getElementById("spiel_datum").innerText = formatiertesDatum;
        document.getElementById("spiel_zeit").innerText = formatierteZeit;
        } else {
        document.getElementById("spiel_datum").innerText = "--.--.";
        document.getElementById("spiel_zeit").innerText = "--:--";
        }

        //Neu
        if (name) {
            const { data: userDaten, error: userError } = await supabase
                .from("users") 
                .select("*")    
                .ilike("username", name)
                .maybeSingle();
                if (meineLadeId !== spielLadeId) return;
                if (!userError && userDaten) {
                const userUUID = userDaten.user_ID || userDaten.user_id;

                const { data: tipp, error: tippError } = await supabase
                    .from("tipps")
                    .select("tore_team_a, tore_team_b")
                    .eq("tipper_ID", userUUID) 
                    .eq("spiel_ID", id)
                    .maybeSingle(); 
                if (meineLadeId !== spielLadeId) return;
                if (!tippError && tipp) {
                    document.getElementById("tore_a").placeholder = tipp.tore_team_a;
                    document.getElementById("tore_b").placeholder = tipp.tore_team_b;
                }
            }
        }

        const istSpielFertig = spiel["Spiel_fertig?"];

        if (istSpielFertig) {
            // A: Das Spiel ist offiziell beendet
            document.getElementById("countdown_box").innerText = "Beendet";
            document.getElementById("overlay_score").innerText = `${spiel.tore_team_a} : ${spiel.tore_team_b}`;
            document.getElementById("overlay").style.display = "flex"; // Zeigt das Overlay an

            document.getElementById("tippSpeichern").disabled = true;
            document.getElementById("tore_a").disabled = true;
            document.getElementById("tore_b").disabled = true;
        } else if (spiel.Startzeit) {
            // B: Spiel läuft noch oder kommt erst noch -> Countdown starten
            const startzeitMs = new Date(spiel.Startzeit).getTime();

            const berechneCountdown = () => {
                const jetztMs = new Date().getTime();
                const verbleibendeZeit = startzeitMs - jetztMs;

                if (verbleibendeZeit <= 0) {
                    // Startzeit überschritten Spiel läuft aktuell
                    document.getElementById("countdown_box").innerText = "Spiel läuft...";
                    document.getElementById("tippSpeichern").disabled = true;
                    document.getElementById("tore_a").disabled = true;
                    document.getElementById("tore_b").disabled = true;
                    clearInterval(countdownInterval);

                if (countdownInterval) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                    }

                } else {
                    // Countdown berechnen (Tage, Stunden, Minuten, Sekunden)
                    const tage = Math.floor(verbleibendeZeit / (1000 * 60 * 60 * 24));
                    const stunden = Math.floor((verbleibendeZeit % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minuten = Math.floor((verbleibendeZeit % (1000 * 60 * 60)) / (1000 * 60));
                    const sekunden = Math.floor((verbleibendeZeit % (1000 * 60)) / 1000);

                    let text = "Tippen möglich bis: ";
                    if (tage > 0) text += `${tage}d `;
                    text += `${stunden}h ${minuten}m ${sekunden}s`;

                    document.getElementById("countdown_box").innerText = text;
                }
            };

            berechneCountdown();

            // Falls das Spiel noch nicht läuft den Intervall-Timer starten
            const jetztMs = new Date().getTime();
            if (startzeitMs - jetztMs > 0) {
                countdownInterval = setInterval(berechneCountdown, 1000);
            }
        } else {
            document.getElementById("countdown_box").innerText = "--";
        }

        offeneTippsBerechnen();

    }



    // Diese Funktion füllt das Dropdown-Menü beim Laden der Seite
    async function spieleListeLaden() {
        const { data: spiele, error } = await supabase
        .from("spiele")
        .select('id, team_a, team_b, name, Startzeit, "Spiel_fertig?"') 
        .eq("spiel_freigeschaltet", true)
        .order("id", { ascending: true });

        if (error) {
            console.error("Fehler beim Laden der Spieleliste:", error.message);
            return;
        }

        const select = document.getElementById("spiel_select");
        select.innerHTML = '<option value="" disabled>-- Bitte wählen --</option>';

        if (spiele) {
            spiele.forEach(spiel => {
                const option = document.createElement("option");
                option.value = spiel.id;
                option.text = spiel.name || `${spiel.team_a} gegen ${spiel.team_b}`; 
                select.appendChild(option);
            });


            const jetztMs = new Date().getTime();
            let closestSpielId = spiele[0].id;
            let minDiffZukunft = Infinity;
            let minDiffVergangenheit = Infinity;
            let pastClosestId = spiele[0].id;

            spiele.forEach(spiel => {
                if (spiel.Startzeit && !spiel["Spiel_fertig?"]) {
                    const spielMs = new Date(spiel.Startzeit).getTime();
                    const diff = spielMs - jetztMs;

                    if (diff >= 0) {

                        if (diff < minDiffZukunft) {
                            minDiffZukunft = diff;
                            closestSpielId = spiel.id;
                        }
                    } else {

                        if (Math.abs(diff) < minDiffVergangenheit) {
                            minDiffVergangenheit = Math.abs(diff);
                            pastClosestId = spiel.id;
                        }
                    }
                }
            });

            if (minDiffZukunft !== Infinity) {
                select.value = closestSpielId;
            } else if (minDiffVergangenheit !== Infinity) {
                select.value = pastClosestId;
            } else if (spiele.length > 0) {
                select.value = spiele[0].id;
            }
        }

        await spielLaden();
        starteBegruessungAnim();
    }

        async function speichern() {
        //Alle Daten aus den Feldern sammeln
        const name = document.getElementById("name").value;
        const spielID = document.getElementById("spiel_select").value;
        const teamA = document.getElementById("team_a").innerText;
        const teamB = document.getElementById("team_b").innerText;
        const toreA = Number(document.getElementById("tore_a").value);
        const toreB = Number(document.getElementById("tore_b").value);

        // Ist alles ausgefüllt?
        if (!name || !spielID || teamA === "") {
            alert("Bitte Namen eingeben und Spiel laden!");
            return;
        }


        const { data: userDaten, error: userError } = await supabase
            .from("users") 
            .select("*")
            .ilike("username", name)
            .maybeSingle();

        if (userError || !userDaten) {
            alert("Fehler: Der Nutzername '" + name + "' existiert nicht in der Tabelle 'profile'!");
            return;
        }

        const userUUID = userDaten.user_ID || userDaten.user_id;

        if (!userUUID) {
            alert("Fehler: Die ID des Nutzers konnte nicht ausgelesen werden. Bitte Spaltennamen prüfen.");
            return;
        }


        const { error } = await supabase
            .from("tipps") 
            .upsert([{
                tipper_ID: userUUID, 
                spiel_ID: spielID,
                tore_team_a: toreA,
                tore_team_b: toreB
            }],
            { onConflict: 'tipper_ID,spiel_ID' });

        if (error) {
            alert("Fehler beim Speichern: " + error.message);
        } else {
            alert("Tipp für " + teamA + " vs. " + teamB + " wurde gespeichert!");

            // Textfelder leeren und Werte in die grauen Platzhalter schieben
            document.getElementById("tore_a").placeholder = toreA;
            document.getElementById("tore_b").placeholder = toreB;
            document.getElementById("tore_a").value = "";
            document.getElementById("tore_b").value = "";

    async function offeneTippsBerechnen() {
        const name = document.getElementById("name").value.trim();
        const counterSpan = document.getElementById("offene_tipps_count");

        if (!name) {
            counterSpan.innerText = "--";
            return;
        }

        const { data: userDaten, error: userError } = await supabase
            .from("users") 
            .select("*")
            .ilike("username", name)
            .maybeSingle();

        if (userError || !userDaten) {
            counterSpan.innerText = "--";
            return;
        }

        const userUUID = userDaten.user_ID || userDaten.user_id;


        const { data: spiele, error: spieleError } = await supabase
            .from("spiele")
            .select('id, Startzeit, "Spiel_fertig?"')
            .eq("spiel_freigeschaltet", true);

        if (spieleError || !spiele) return;

        const { data: tipps, error: tippsError } = await supabase
            .from("tipps")
            .select("spiel_ID")
            .eq("tipper_ID", userUUID);

        if (tippsError || !tipps) return;

        const getippteSpielIDs = new Set(tipps.map(t => String(t.spiel_ID)));

        let offeneTipps = 0;
        const jetztMs = new Date().getTime();

        spiele.forEach(spiel => {

            if (!getippteSpielIDs.has(String(spiel.id))) {

                const istFertig = spiel["Spiel_fertig?"];
                const startzeitMs = spiel.Startzeit ? new Date(spiel.Startzeit).getTime() : 0;
                const läuftBereits = spiel.Startzeit && (startzeitMs <= jetztMs);


                if (!istFertig && !läuftBereits) {
                    offeneTipps++;
                }
            }
        });

        counterSpan.innerText = offeneTipps;
    }
