<!DOCTYPE html> 
<html lang="de"> 
<head> 
    <meta charset="UTF-8"> 
    <title>WM 2026 Tippspiel</title> 
  <style>
      
@font-face {
      font-family: 'MeineSchrift';
      src: url('GREGH___.ttf');
    }

    body {
      font-family: Arial, sans-serif;
      background-image: url("rasen chatgpt.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      text-align: center;
      margin: 40px;
      padding-top: 200px;
      position: relative;
    }
      
 #header {
      display: flex;
      flex-direction: row;   /* Nebeneinander auch auf dem Smartphone */
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-top: -120px;
      text-align: center;
      flex-wrap: wrap;       /* Verhindert Überlaufen auf kleinen Displays */
    }

      
    #title {
      position: relative;
      top: 0;
      left: 0;
      font-size: clamp(40px, 6vw, 120px);
      color: white;
    }

      /* evlt entsorgen: 
    #wirsberg-logo {
      height: 150px;
    }
*/

    #logo-container {
      position: relative;
      display: inline-block;
    }

    #logo {
        display: inline-block;
        position: relative;
        left: 20px;   
        right: 20px;  
        top: 10px;    
        bottom: 10px; 
        font-size: 90px;
        
        /*hier ÄNderungen von Steven -- >nochmal abgleichen mit Max Gr.*/
        font-family: 'MeineSchrift', sans-serif; 
        color: white;
        font-weight: bold;
        letter-spacing: 0px;
        text-shadow: 3px 3px 8px rgba(0,0,0,0.3);
    }

    #ball-wrapper {
      position: absolute;
      left: 21%;
      top: 68,5%;
      transform: translate(-50%,-50%);
      animation: flug 1.5s ease-out forwards;
    }

    #ball {
      width: 20px;
      height: 20px;
      font-size: 38px;
      line-height: 44px;
      position: relative;
      z-index: 2;
      display: inline-block;
      animation: spin 15s linear infinite;
    }


    #name {
      margin-top: 50px;
    }

    label {
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.6);
    }

    #team_a, #team_b {
      font-size: 28px;
      color: white;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    }

    .cursor {
      animation: blink 0.8s infinite;
      color: white;
      font-weight: bold;
      margin-left: 2px;
    }

  @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes flug {
        from {
            transform: translate(-50%, -50%) translate(800px, 400px);
        }
        to {
            transform: translate(-50%, -50%) translate(0, 0);
        }
    }


    button {
      padding: 10px 20px;
      border-radius: 5px;
      border: none;
      background-color: red;
      color: white;
      cursor: pointer;
    }

    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }


    .info-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background-color: #e6f2ff;
      color: #0066cc;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      font-family: Arial, sans-serif;
      cursor: pointer;
      position: relative;
    }

    .info-badge::after {
      content: "Noch zu tippende Spiele";
      position: absolute;
      bottom: 140%;
      right: 0; 
      background-color: #0066cc;
      color: white;
      padding: 6px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-family: Arial, sans-serif;
      font-weight: normal;
      white-space: nowrap;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
    }

    .info-badge::before {
      content: "";
      position: absolute;
      bottom: 120%;
      right: 25px; 
      border-width: 6px;
      border-style: solid;
      border-color: #0066cc transparent transparent transparent;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease-in-out;
      pointer-events: none;
      z-index: 999;
    }

    .info-badge:hover::after, .info-badge:hover::before,
    .info-badge.active::after, .info-badge.active::before {
      visibility: visible;
      opacity: 1;
    }

    .info-icon-blue {
      color: white;
      background-color: #0066cc;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      font-size: 11px;
      line-height: 16px;
      text-align: center;
      font-family: "Georgia", serif;
      font-weight: bold;
      display: inline-block;
    }
  </style>
</head>      

    <body>

<div id="header">
  <div id="logo-container">
    <img id="logo" src="logo mit titel final.png">
    <span id="ball-wrapper">
        <img id="ball" src="fussball_ohne_schatten.png">
    </span>
  </div>
</div>
<br>


        
    </body>
      
</html>
