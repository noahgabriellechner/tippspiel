<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Profilseite</title>

   <style>
    body {
        font-family: Arial, sans-serif;
        background-image: url("rasen chatgpt.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
      max-width: 250px;
      margin: 12px auto;
      background: white;
      padding: 12px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .profil {
      max-width: 500px;
      margin: 12px auto;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .profil p {
      padding: 12px 14px;
      background: #f8fafc;
      border-radius: 10px;
      margin: 0 0 12px;
    }

    #ausgabe {
      max-width: 500px;
      margin: 16px auto 0;
      color: #b91c1c;
      font-weight: bold;
    }

    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-width: 100%;
      margin: 0;
      padding: 12px 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 14px 14px 0 0;
      box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(4px);
      z-index: 1000;
    }

    footer p {
      margin: 0;
      line-height: 1.6;
    }

    footer a {
      color: #0f172a;
      text-decoration: none;
      font-weight: 600;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>

</head>
<body>

    <h1>Mein Profil</h1>

    <div class="profil">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Benutzername:</strong> <span id="username"></span></p>
        <p><strong>E-Mail:</strong> <span id="email"></span></p>
        <p><strong>Profilstatus:</strong> <span id="profile_status">Laden...</span></p>
    </div>

    <div id="profile_completion" style="max-width: 500px; margin: 0 auto 24px; background: #f8fafc; padding: 16px; border-radius: 10px; display: none;">
        <h2>Profil vervollständigen</h2>
        <input id="input_vorname" type="text" placeholder="Vorname" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;" />
        <input id="input_name" type="text" placeholder="Nachname" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;" />
        <input id="input_username" type="text" placeholder="Benutzername" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ccc;" />
        <button id="save-profile" style="padding:10px 20px; margin-top:10px;">Profil speichern</button>
        <p id="status" style="margin-top:12px; color:#b91c1c;"></p>
    </div>

    <div id="ausgabe"></div>

    <footer>
      <p>
        <a href="index.html">Startseite</a> |
        <a href="datenschutzerklärung.html">Datenschutzerklärung</a>  |
        <a href="impressum.html">Impressum</a>    | 
        <button id="logout">Logout</button> 
      </p>
    </footer>
    
 <!--Logik und DB-Verbindung mit JavaScript -->
  <script type="module">

    
     //---------------------------------------------------------------------
    //Supabase Verbindung (nicht ändern!!)
    //----------------------------------------------------------------------
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const supabaseUrl = "https://kmhwwdsuzphkpfupkynf.supabase.co";
    const supabaseKey = "sb_publishable_7ih4VSPUkXVfHkBa7lrDCA_mO_d0pW1";

    const supabase = createClient(supabaseUrl, supabaseKey);

    //Session holen, um Daten des Users auslesen zu können. Keine Session->Weiterleitung zum login.html
    //const { data: { session } } = await supabase.auth.getSession();
    //if (!session) {
    //    window.location.href = "login.html";
    //}

    async function loadProfile() {
        const { data: { session }, error: authError } = await supabase.auth.getSession();

        if (authError || !session) {
            window.location.href = "login.html";
            return;
        }

        const user = session.user;
        document.getElementById("email").innerText = user.email || "-";

        const { data: profile, error } = await supabase
            .from("users")
            .select("username, Vorname, Name")
            .eq("user_ID", user.id)
            .maybeSingle();

        if (error) {
            document.getElementById("ausgabe").innerText = error.message;
            return;
        }

        if (!profile) {
            document.getElementById("profile_status").innerText = "Profil unvollständig";
            document.getElementById("profile_completion").style.display = "block";
            document.getElementById("name").innerText = "-";
            document.getElementById("username").innerText = "-";
            return;
        }

        document.getElementById("profile_status").innerText = "Profil vollständig";
        document.getElementById("name").innerText = `${profile.Vorname || ""} ${profile.Name || ""}`.trim();
        document.getElementById("username").innerText = profile.username || "-";
        document.getElementById("input_vorname").value = profile.Vorname || "";
        document.getElementById("input_name").value = profile.Name || "";
        document.getElementById("input_username").value = profile.username || "";
        document.getElementById("profile_completion").style.display = "none";
    }

    async function saveProfile() {
        const { data: { session }, error: authError } = await supabase.auth.getSession();
        if (authError || !session) {
            window.location.href = "login.html";
            return;
        }

        const user = session.user;
        const vorname = document.getElementById("input_vorname").value.trim();
        const name = document.getElementById("input_name").value.trim();
        const username = document.getElementById("input_username").value.trim();
        const status = document.getElementById("status");

        status.innerText = "";

        if (!vorname || !name || !username) {
            status.innerText = "Bitte Vorname, Nachname und Benutzername ausfüllen.";
            return;
        }

        const { error } = await supabase.from("users").upsert([
            {
                user_ID: user.id,
                username: username,
                Vorname: vorname,
                Name: name
            }
        ], { onConflict: "user_ID" });

        if (error) {
            status.innerText = error.message;
            return;
        }

        await loadProfile();
        status.innerText = "Profil gespeichert.";
    }

    async function logout() {
        await supabase.auth.signOut();
        window.location.href = "login.html";
    }

    document.getElementById("logout").addEventListener("click", logout);
    document.getElementById("save-profile").addEventListener("click", saveProfile);

    loadProfile();

</script> 
</body>
</html>
